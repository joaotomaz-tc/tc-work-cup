<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#F5F5F7"/>
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
<link rel="apple-touch-icon" href="/favicon.svg"/>
<title>TC World Cup 2026 Sweepstake</title>
<style>html,body{margin:0;padding:0;background:var(--bg,#F5F5F7)}#root{min-height:100vh}</style>
</head>
<body>
<script>
// Inline theme init to prevent flash — runs before React hydrates
(function(){try{var t=localStorage.getItem("tc-work-cup:theme:v1");var d=t==="dark"||(t!=="light"&&window.matchMedia("(prefers-color-scheme:dark)").matches)?"dark":"light";document.documentElement.setAttribute("data-theme",d);}catch(e){}})();
</script>
<div id="root"></div>
<script src="/js/storage-shim.js"></script>
<script type="module" src="/js/app.jsx"></script>
</body>
</html>
